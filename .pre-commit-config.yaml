# Pre-commit hooks for xmlrpc_extended
# Run: pre-commit install  (once, after cloning)
# Manual run: pre-commit run --all-files
# Update pinned versions: pre-commit autoupdate

repos:
  # ── Standard file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Ruff: lint + format ────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff          # lint with auto-fix
        args: [--fix]
      - id: ruff-format   # opinionated formatter (replaces black)

  # ── Mypy: strict type checking ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        files: ^src/
        args: [--strict]
        additional_dependencies: []  # add stubs here if needed
